name: Generate Yesterday's Page

on:
  schedule:
    # 每天 UTC 0:00 运行 (北京时间 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      sites:
        description: '选择要生成的网站'
        required: false
        type: choice
        options:
          - all
          - 新智元
          - 机器之心
        default: 'all'

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch existing gh-pages content
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            mkdir -p output
            git --work-tree=output checkout origin/gh-pages -- . 2>/dev/null || echo "No content in gh-pages yet"
          fi

      - name: Restore RSS cache
        uses: actions/cache@v4
        with:
          path: data
          key: rss-cache-${{ github.run_id }}
          restore-keys: |
            rss-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Generate yesterday's pages (parallel)
        run: |
          if [ "${{ github.event.inputs.sites }}" = "all" ] || [ -z "${{ github.event.inputs.sites }}" ]; then
            python scripts/generate_all_pages.py --date yesterday --parallel
          else
            python scripts/generate_all_pages.py --date yesterday --site "${{ github.event.inputs.sites }}"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./output
          keep_files: false