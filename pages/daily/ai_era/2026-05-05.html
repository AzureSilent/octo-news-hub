<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新智元 - 2026年05月05日 文章列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .header p {
            font-size: 0.95em;
            opacity: 0.9;
        }
        
        .nav-links {
            padding: 15px 30px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
        }
        
        .nav-link {
            padding: 8px 16px;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            text-decoration: none;
            color: #374151;
            transition: all 0.2s ease;
        }
        
        .nav-link:hover {
            background: #f3f4f6;
            border-color: #9ca3af;
        }
        
        .prev-link {
            margin-right: auto;
        }
        
        .next-link {
            margin-left: auto;
        }
        
        .content {
            padding: 30px;
        }
        
        .article {
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 20px;
            padding-bottom: 20px;
        }
        
        .article:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .article-header {
            cursor: pointer;
            padding: 10px 0;
            transition: background 0.2s ease;
        }
        
        .article-header:hover {
            background: #f9fafb;
            margin: 0 -10px;
            padding: 10px;
            border-radius: 6px;
        }
        
        .article-title {
            font-size: 1.2em;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1f2937;
        }
        
        .article-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #6b7280;
            align-items: center;
        }
        
        .article-time {
            background: #e5e7eb;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .article-link a {
            color: #667eea;
            text-decoration: none;
        }
        
        .article-link a:hover {
            text-decoration: underline;
        }
        
        .article-content {
            margin-top: 15px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }
        
        .article-summary {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .article-full {
            color: #374151;
        }
        
        .article-full img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 10px 0;
        }
        
        .article-full p {
            margin-bottom: 10px;
        }
        
        .no-articles {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        
        .footer {
            background: #f9fafb;
            padding: 20px;
            text-align: center;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
            font-size: 0.9em;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .header {
                padding: 20px;
            }
            
            .article-title {
                font-size: 1.1em;
            }
        }
    </style>
    <script>
        function toggleArticle(id) {
            var content = document.getElementById('content-' + id);
            if (content.style.display === 'none') {
                content.style.display = 'block';
            } else {
                content.style.display = 'none';
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>新智元 - 2026年05月05日 文章列表</h1>
            <p>AI前沿技术动态</p>
        </div>
        
        <div class="nav-links">
        <a href="2026-05-04.html" class="nav-link prev-link">← 2026-05-04</a>
        <a href="2026-05-06.html" class="nav-link next-link">2026-05-06 →</a>
      </div>

        
        <div class="content">
            <div class="no-articles"><p>该日期没有文章</p></div>
        </div>
        
        <div class="footer">
            <p>生成时间: 2026-05-05 12:51:19</p>
        </div>
    </div>
</body>
</html>
